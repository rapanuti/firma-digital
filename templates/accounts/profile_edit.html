{% extends "base.html" %}

{% block title %}Editar perfil · Firma Digital{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl">
    <h1 class="text-xl font-semibold text-slate-900">Editar perfil</h1>

    <form method="post" class="mt-6 space-y-4 rounded-xl border border-slate-200 bg-white p-6">
        {% csrf_token %}
        <div>
            <label for="{{ form.first_name.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">Nombre</label>
            {{ form.first_name }}
        </div>
        <div>
            <label for="{{ form.last_name.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">Apellido</label>
            {{ form.last_name }}
        </div>
        <div>
            <label for="{{ form.email.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
            {{ form.email }}
            {% if form.email.errors %}
                <p class="mt-1 text-sm text-red-600">{{ form.email.errors|join:" " }}</p>
            {% endif %}
        </div>

        <div class="flex gap-2 pt-2">
            <button type="submit"
                    class="rounded-md bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-700">Guardar</button>
            <a href="{% url 'accounts:profile' %}"
               class="rounded-md border border-slate-300 px-4 py-2 text-sm hover:bg-slate-50">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
